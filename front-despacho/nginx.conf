server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Proxy hacia el backend de DESPACHOS (puerto 8081) ---
    # Va ANTES que /api/v1/ventas no es necesario, nginx elige el prefijo mas largo.
    location /api/v1/despachos {
        proxy_pass http://despachos-svc:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Proxy hacia el backend de VENTAS (puerto 8080) ---
    location /api/v1/ventas {
        proxy_pass http://ventas-svc:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- SPA: cualquier otra ruta devuelve index.html (React Router) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
