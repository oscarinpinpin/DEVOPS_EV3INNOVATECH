# ==========================================================================
# docker-compose.yml — ENTORNO DE DESARROLLO LOCAL (IE2 de la rúbrica)
#
# Levanta toda la plataforma InnovaTech en tu máquina con un solo comando:
#     docker compose up --build
# Luego abre:  http://localhost:8080
#
# NO se usa para el despliegue en la nube (eso son los manifiestos de
# infra/k8s/). Este archivo es SOLO para desarrollo/prueba local, tal como
# pide el indicador "Contenerización para Desarrollo Local".
#
# Los servicios ventas-svc y despachos-svc se llaman así a propósito: el
# nginx del frontend proxea /api/v1/ventas -> ventas-svc:8080 y
# /api/v1/despachos -> despachos-svc:8081 por esos nombres de host.
# ==========================================================================
services:

  # ---- Base de datos MySQL (crea ventasdb y despachosdb automáticamente) ----
  mysql:
    image: mysql:8.0
    container_name: innovatech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Innovatech2025!
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"          # expuesto solo para inspección local (opcional)
    volumes:
      - mysql-data:/var/lib/mysql   # volumen: los datos persisten entre reinicios
    networks:
      - innovatech-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ---- Backend Ventas (Spring Boot :8080) ----
  ventas-svc:
    build: ./back-ventas-springboot/api-rest-ventas
    container_name: innovatech-ventas
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: "3306"
      DB_NAME: ventasdb
      DB_USERNAME: root
      DB_PASSWORD: Innovatech2025!
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - innovatech-net

  # ---- Backend Despachos (Spring Boot :8081) ----
  despachos-svc:
    build: ./back-bespachos-springboot/api-rest-despacho
    container_name: innovatech-despachos
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: "3306"
      DB_NAME: despachosdb
      DB_USERNAME: root
      DB_PASSWORD: Innovatech2025!
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - innovatech-net

  # ---- Frontend (React + nginx :80) — único expuesto al navegador ----
  frontend:
    build: ./front-despacho
    container_name: innovatech-frontend
    ports:
      - "8080:80"            # abre http://localhost:8080
    depends_on:
      - ventas-svc
      - despachos-svc
    networks:
      - innovatech-net

# ---- Red interna del entorno de desarrollo ----
networks:
  innovatech-net:
    driver: bridge

# ---- Volumen persistente de la base de datos ----
volumes:
  mysql-data:
