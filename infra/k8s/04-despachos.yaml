# ==========================================================================
# Backend DESPACHOS (Spring Boot, puerto 8081).
# ==========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: despachos
  namespace: innovatech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: despachos
  template:
    metadata:
      labels:
        app: despachos
    spec:
      containers:
        - name: despachos
          image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/innovatech-despachos:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_ENDPOINT
              value: "mysql-svc"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "despachosdb"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: despachos-svc
  namespace: innovatech
spec:
  selector:
    app: despachos
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
