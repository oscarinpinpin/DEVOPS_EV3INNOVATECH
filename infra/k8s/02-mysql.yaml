# ==========================================================================
# Base de datos MySQL dentro del cluster.
# Una sola replica. Usa emptyDir (NO persiste si el pod muere): suficiente
# para la demo. Si necesitas persistencia real, se documenta el cambio a PVC
# con el addon EBS CSI en la guia (seccion "Mejoras opcionales").
# ==========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: innovatech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MYSQL_ROOT_PASSWORD
          # Crea las dos bases al iniciar (ademas el JDBC usa createDatabaseIfNotExist)
          args:
            - "--default-authentication-plugin=mysql_native_password"
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "640Mi"
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 40
            periodSeconds: 20
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: innovatech
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None   # headless: el DNS mysql-svc resuelve directo al pod
