# ==========================================================================
# Secret con las credenciales de la base de datos.
#
# IE5 de la rubrica = "Gestion de Secrets y credenciales". Las contrasenas
# NO van en los Deployments ni en el codigo: van aqui, y los pods las leen
# como variables de entorno via secretKeyRef.
#
# stringData deja escribir el valor en texto plano y Kubernetes lo codifica
# en base64 internamente. Cambia la contrasena por una tuya antes de aplicar.
# ==========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: innovatech
type: Opaque
stringData:
  DB_USERNAME: "root"
  DB_PASSWORD: "Innovatech2025!"   # <-- cambiala por la tuya
  MYSQL_ROOT_PASSWORD: "Innovatech2025!"  # debe coincidir con DB_PASSWORD
